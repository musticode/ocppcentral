version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    image: ocppcentral:latest
    container_name: ocppcentral-production
    restart: always
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    networks:
      - ocppcentral-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ocppcentral-redis-production
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data-production:/data
    networks:
      - ocppcentral-network
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: ocppcentral-nginx-production
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - ocppcentral-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  redis-data-production:
  nginx-cache:

networks:
  ocppcentral-network:
    driver: bridge
